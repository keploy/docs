# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ main ]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:    
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v2
      
      - name: Set Node.js 22.x
        uses: actions/setup-node@v3
        with:
          node-version: 22.x

      - uses: borales/actions-yarn@v4
        with:
          cmd: install # will run `yarn install` command
      - uses: borales/actions-yarn@v4
        with:
          cmd: build # will run `yarn build` command
          
      # create a build/docs folder and move all content from build there
      - name: Add docs subfolder
        run: |
          mv  ./build build-old
          mkdir -p build/docs
          mv build-old/* build/docs

      - name: Deploy
        uses: reggionick/s3-deploy@v3
        with:
          folder: build
          bucket: ${{ secrets.S3_BUCKET }}
          bucket-region: ${{ secrets.S3_BUCKET_REGION }}
          dist-id: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
          invalidation: /docs*
          delete-removed: true
          cache: "public, max-age:86400"
          private: true

      - name: Submit latest 100 docs URLs to IndexNow
        run: |
          set -e

          SITEMAP="build/docs/sitemap.xml"
          if [ ! -f "$SITEMAP" ]; then
            echo "::warning::Sitemap not found at $SITEMAP, fetching from live site"
            curl -s --compressed https://keploy.io/docs/sitemap.xml -o /tmp/sitemap.xml
            SITEMAP="/tmp/sitemap.xml"
          fi

          # Extract URLs, take latest 100 (Docusaurus lists newest content first)
          URLS=$(grep -oP '<loc>\K[^<]+' "$SITEMAP" | head -100)

          if [ -z "$URLS" ]; then
            echo "No URLs found, submitting docs index"
            URLS="https://keploy.io/docs/"
          fi

          URL_COUNT=$(echo "$URLS" | wc -l)
          echo "Submitting $URL_COUNT docs URLs to IndexNow"

          JSON_URLS=$(echo "$URLS" | jq -R -s 'split("\n") | map(select(length > 0))')

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{\"host\":\"keploy.io\",\"key\":\"9ded60b43b8b40578588fc42b04c3e5d\",\"urlList\":$JSON_URLS}")

          echo "IndexNow response: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::warning::IndexNow submission returned HTTP $HTTP_CODE"
          fi
