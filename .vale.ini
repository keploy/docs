# vale.ini

StylesPath = vale_styles  # Update this path to where your styles are stored.
MinAlertLevel = error    # Set the minimum alert level to display (suggestion, warning, or error).
Vocab = Base

[*.md]
# Enable Markdown-specific styles.
BasedOnStyles = Vale, Google

# Skip MDX component blocks. The <HowTo> wrapper carries JSX prop values
# (step text, tool/supply names, em-dash separators in display names) that
# Vale otherwise lints as prose — flagging quote/punctuation rules and
# em-dash spacing on what is structured component data, not narrative
# copy. The two patterns cover both self-closing (<HowTo ... />) and
# paired (<HowTo>...</HowTo>) usages so future authors can use either.
# Use [\s\S] instead of `.` (Vale's regex doesn't honour `(?s)` reliably
# in BlockIgnores) and intentionally allow `>` inside the prop body —
# `[^>]` would break on JSX values like `Linux kernel >= 5.10`.
BlockIgnores = (?s)<HowTo\b[\s\S]*?/>, \
               (?s)<HowTo\b[\s\S]*?</HowTo>

# Customize specific rules based on your needs.
List.Capitalization = YES

# Override some rules:
Vale.Spelling = YES
Google.PassiveVoice = NO    # Disable passive voice rule if unnecessary
Google.We = NO              # Disable first-person plural flagging
Google.Will = NO            # Allow "will" usage
Google.Exclamation = NO     # Allow exclamation points
Google.Ellipses = NO        # Allow ellipses in text
Google.Latin = NO           # Allow "e.g." and "i.e." instead of "for example"
Google.Units = NO           # Allow "k8s" — Google.Units' \d+s regex matches "8s" inside the token
Google.EmDash = NO          # Allow spaced em-dashes — used consistently across the repo for prose readability (the Google style wants `—` without spaces; many existing docs use the spaced form intentionally)
Google.Quotes = NO          # Allow logical (British) punctuation around quotation marks — the docs use period-OUTSIDE-quote for technical tokens (e.g. `the value "FAILED".`) so dropping a period inside doesn't alter the literal token the reader is supposed to paste

# Allow specific terms:
Vale.Terms=NO

